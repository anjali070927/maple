<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maple Apartments - My Profile</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Profile Specific Styles */
        .profile-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            align-items: start;
        }

        .profile-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 2rem;
            text-align: center;
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            background-color: var(--primary-light);
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 auto 1.5rem;
        }

        .profile-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .profile-detail {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        @media (max-width: 900px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-leaf"></i> Maple Apts
        </div>
        <ul class="nav-links">
            <li><a href="user-dashboard.html"><i class="fa-solid fa-house-chimney"></i> Dashboard</a></li>
            <li><a href="#"><i class="fa-solid fa-file-invoice-dollar"></i> Maintenance Bills</a></li>
            <li><a href="#"><i class="fa-solid fa-building-columns"></i> Property Tax</a></li>
            <li><a href="#" class="active"><i class="fa-solid fa-user"></i> My Profile</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="index.html" class="logout-btn" onclick="sessionStorage.clear()"><i
                    class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-wrapper">
        <header class="header">
            <h1 class="page-title">My Profile</h1>
            <div class="user-profile">
                <span style="font-weight: 500; color: #4b5563;" id="headerName">Loading...</span>
                <div class="avatar" id="headerAvatar">U</div>
            </div>
        </header>

        <section class="content">

            <div class="alert-success" id="successAlert">
                <i class="fa-solid fa-circle-check"></i> Profile information updated successfully!
            </div>

            <div class="profile-container">
                <!-- Left Side: Profile Overview -->
                <div class="profile-card">
                    <div class="profile-avatar-large" id="mainAvatar">U</div>
                    <h2 class="profile-name" id="profileName">Owner Name</h2>
                    <p class="profile-detail"><i class="fa-solid fa-house"></i> Flat: <strong
                            id="profileFlat">---</strong></p>
                    <p class="profile-detail"><i class="fa-solid fa-envelope"></i> <span
                            id="profileEmail">email@example.com</span></p>
                    <p class="profile-detail"><i class="fa-solid fa-phone"></i> <span id="profilePhone">+1 234 567
                            890</span></p>

                    <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
                        <span class="badge badge-paid">Active Resident</span>
                    </div>
                </div>

                <!-- Right Side: Edit Flat Details -->
                <div class="panel" style="margin-bottom: 0;">
                    <div class="panel-header">
                        <h2 class="panel-title">Apartment Living Details</h2>
                    </div>
                    <div style="padding: 1.5rem;">
                        <form id="profileForm">
                            <div class="form-group">
                                <label for="numResidents">Number of People Living in Flat</label>
                                <input type="number" id="numResidents" class="form-control" min="1" max="15"
                                    placeholder="e.g. 4">
                            </div>

                            <div class="form-group">
                                <label for="purchaseYear">Year House Was Bought</label>
                                <input type="number" id="purchaseYear" class="form-control" min="1950" max="2030"
                                    placeholder="e.g. 2021">
                            </div>

                            <div class="form-group">
                                <label for="rentalStatus">Current Flat Status</label>
                                <select id="rentalStatus" class="form-control">
                                    <option value="Self Occupied">Self Occupied (Owner living here)</option>
                                    <option value="Rented">On Rent (Tenants living here)</option>
                                    <option value="Vacant">Vacant</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="petsDetails">Pets (If any)</label>
                                <input type="text" id="petsDetails" class="form-control" placeholder="e.g. 1 Dog">
                            </div>

                            <div style="margin-top: 2rem; display: flex; justify-content: flex-end;">
                                <button type="submit" class="btn-primary" style="padding: 0.75rem 1.5rem;" id="saveBtn">
                                    <i class="fa-solid fa-floppy-disk" style="margin-right: 0.5rem;"></i> Save Changes
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = sessionStorage.getItem('maple_user');
            if (userStr) {
                const user = JSON.parse(userStr);

                // Populate Header
                document.getElementById('headerName').textContent = `Flat ${user.flat_number} (${user.owner_name})`;
                document.getElementById('headerAvatar').textContent = user.owner_name.charAt(0).toUpperCase();

                // Populate Left Card
                document.getElementById('mainAvatar').textContent = user.owner_name.charAt(0).toUpperCase();
                document.getElementById('profileName').textContent = user.owner_name;
                document.getElementById('profileFlat').textContent = user.flat_number;
                document.getElementById('profileEmail').textContent = user.email || 'No email provided';
                document.getElementById('profilePhone').textContent = user.mobile_number || 'N/A';

                // Load any previously saved details from LocalStorage (Mock DB for now)
                const savedDetailsStr = localStorage.getItem(`maple_details_${user.flat_number}`);
                if (savedDetailsStr) {
                    const details = JSON.parse(savedDetailsStr);
                    document.getElementById('numResidents').value = details.residents || '';
                    document.getElementById('purchaseYear').value = details.year || '';
                    document.getElementById('rentalStatus').value = details.status || 'Self Occupied';
                    document.getElementById('petsDetails').value = details.pets || '';
                }

                // Handle Form Submission
                document.getElementById('profileForm').addEventListener('submit', (e) => {
                    e.preventDefault();

                    const saveBtn = document.getElementById('saveBtn');
                    const originalHtml = saveBtn.innerHTML;
                    saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right: 0.5rem;"></i> Saving...';

                    // Mock Saving to DB via LocalStorage
                    const detailsToSave = {
                        residents: document.getElementById('numResidents').value,
                        year: document.getElementById('purchaseYear').value,
                        status: document.getElementById('rentalStatus').value,
                        pets: document.getElementById('petsDetails').value
                    };

                    setTimeout(() => {
                        localStorage.setItem(`maple_details_${user.flat_number}`, JSON.stringify(detailsToSave));

                        saveBtn.innerHTML = originalHtml;
                        const alertBox = document.getElementById('successAlert');
                        alertBox.style.display = 'flex';

                        // Hide alert after 3 seconds
                        setTimeout(() => {
                            alertBox.style.display = 'none';
                        }, 3000);

                    }, 600);
                });

            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
